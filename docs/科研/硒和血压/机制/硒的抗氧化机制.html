<h2 id="概述">概述</h2>

<p>硒是一种重要的微量元素，具有强大的抗氧化作用。</p>

<h2 id="作用机制">作用机制</h2>

<ol>
<li>硒是谷胱甘肽过氧化物酶的重要组成部分</li>
<li>参与清除体内自由基</li>
<li>保护细胞免受氧化损伤</li>
</ol>
